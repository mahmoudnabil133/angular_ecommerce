  <div class="row justify-content-center mt-5">
      <div class="col-md-4">
        <div class="card shadow">
          <div class="card-body p-4">
            <h4 class="card-title mb-4 text-center">Register</h4>
            <div class="alert alert-danger" *ngIf="error">{{ error }}</div>
            <div class="alert alert-success" *ngIf="success">Account created! <a routerLink="/login">Login</a></div>
            <form [formGroup]="form" (ngSubmit)="submit()">
              <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" formControlName="fullName"
                  [class.is-invalid]="form.get('fullName')?.invalid && form.get('fullName')?.touched">
                <div class="invalid-feedback">Full name required.</div>
              </div>
              <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" formControlName="email"
                  [class.is-invalid]="form.get('email')?.invalid && form.get('email')?.touched">
                <div class="invalid-feedback">Valid email required.</div>
              </div>
              <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" formControlName="password"
                  [class.is-invalid]="form.get('password')?.invalid && form.get('password')?.touched">
                <div class="invalid-feedback">Min 6 characters.</div>
              </div>
              <button class="btn btn-dark w-100" type="submit" [disabled]="loading">
                <span *ngIf="loading" class="spinner-border spinner-border-sm me-1"></span>
                Register
              </button>
            </form>
            <p class="text-center mt-3 mb-0">
              Have an account? <a routerLink="/login">Login</a>
            </p>
          </div>
        </div>
      </div>
    </div>
