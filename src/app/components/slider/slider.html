<div class="slider-container">
  <div id="carouselExampleIndicators" class="carousel slide" data-bs-ride="carousel">
    <div class="carousel-indicators">
      <button *ngFor="let slide of slides; let idx = index" type="button" data-bs-target="#carouselExampleIndicators" [attr.data-bs-slide-to]="idx" [class.active]="idx===0" [attr.aria-current]="idx===0? 'true': null" [attr.aria-label]="'Slide ' + (idx+1)"></button>
    </div>
    <div class="carousel-inner">
      <div *ngFor="let slide of slides; let idx = index" class="carousel-item" [class.active]="idx===0">
        <img [src]="slide.imageUrl" class="d-block w-100" [alt]="slide.title">
        <div class="carousel-caption d-none d-md-block">
          <h5>{{ slide.title }}</h5>
          <p>{{ slide.description }}</p>
        </div>
      </div>
    </div>
    <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="prev">
      <span class="carousel-control-prev-icon" aria-hidden="true"></span>
      <span class="visually-hidden">Previous</span>
    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="next">
      <span class="carousel-control-next-icon" aria-hidden="true"></span>
      <span class="visually-hidden">Next</span>
    </button>
  </div>
</div>
