<div class="container">
    <div class="d-flex justify-content-end mb-3"> 
        <button class="btn btn-success" routerLink="/create-product">+Create Product</button>
    </div>
    <div class="row">
        @for (item of products; track item.id) {
            <div class="col-md-3 mb-4">
                <app-product-card>
                    <img 
                        [src]="item.image || 'https://i.pinimg.com/1200x/34/6e/7a/346e7ac45123572b94af0843a37a19d9.jpg'" 
                        class="card-img-top" 
                        alt="productImage"
                    >
    
                    <h5>{{item.name}}</h5>
    
                    <p>Price: {{item.price}}</p>
                    <p>Stock: {{item.inStock}}</p>
    
                    <div class="actions">
                        <button 
                            class="btn btn-primary btn-sm"
                            [routerLink]="['/update-product', item.id]"
                        >
                            Edit
                        </button>
    
                        <button 
                            class="btn btn-danger btn-sm"
                            (click)="deleteProduct(item.id)"
                        >
                            Delete
                        </button>
                </div>
    
                </app-product-card>        
            </div>
        }
    </div>
</div>
