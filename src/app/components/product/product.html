<div class="container">
    <div class="row mt-5">
        @for (item of products; track $index) {
            <div class="col-md-3">
                <div class="card">
                    <img [src]="item.imageUrl" class="card-img-top" alt="productImag">
                    <div class="card-body ">
                        <h5 class="card-title" [ngClass]="item.inStock ? 'text-danger' : 'text-success'">{{item.name}}</h5>
                        <p class="card-text">{{item.description}}</p>
                        <p [ngClass]="item.price > 100 ? 'text-danger' : 'text-success'">
                        {{item.price}}
                        </p>
                        <button [disabled]="item.inStock"> buy</button>        
                    </div>
                </div>
            </div>
        }
    </div>

</div>
