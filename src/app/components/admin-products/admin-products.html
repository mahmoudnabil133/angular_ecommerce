    <div class="d-flex justify-content-between align-items-center mb-3">
      <h4>Manage Products</h4>
      <button class="btn btn-dark btn-sm" (click)="openCreate()">+ New Product</button>
    </div>

    <!-- Modal -->
    <div class="modal d-block bg-dark bg-opacity-50" *ngIf="showModal">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">{{ editId ? 'Edit' : 'Create' }} Product</h5>
            <button class="btn-close" (click)="closeModal()"></button>
          </div>
          <div class="modal-body">
            <div class="alert alert-danger" *ngIf="formError">{{ formError }}</div>
            <form [formGroup]="form" (ngSubmit)="submit()">
              <div class="mb-3">
                <label class="form-label">Name</label>
                <input class="form-control" formControlName="name">
              </div>
              <div class="mb-3">
                <label class="form-label">Price</label>
                <input type="number" class="form-control" formControlName="price">
              </div>
              <div class="mb-3">
                <label class="form-label">In Stock</label>
                <input type="number" class="form-control" formControlName="inStock">
              </div>
              <div class="mb-3">
                <label class="form-label">Category</label>
                <select class="form-select" formControlName="categoryId">
                  <option value="">Select category</option>
                  <option *ngFor="let c of categories" [value]="c._id">{{ c.name }}</option>
                </select>
              </div>
              <div class="mb-3">
                <label class="form-label">Image URL (optional)</label>
                <input class="form-control" formControlName="image">
              </div>
              <button class="btn btn-dark w-100" type="submit" [disabled]="saving">
                <span *ngIf="saving" class="spinner-border spinner-border-sm me-1"></span>
                {{ editId ? 'Update' : 'Create' }}
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <div *ngIf="loading" class="text-center py-5"><div class="spinner-border"></div></div>

    <div class="table-responsive" *ngIf="!loading">
      <table class="table table-hover align-middle">
        <thead class="table-dark">
          <tr>
            <th>Name</th><th>Price</th><th>Stock</th><th>Category</th><th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let p of products">
            <td>{{ p.name }}</td>
            <td>EGP {{ p.price | number }}</td>
            <td>
              <span class="badge" [class.bg-success]="p.inStock > 0" [class.bg-danger]="p.inStock === 0">
                {{ p.inStock }}
              </span>
            </td>
            <td>{{ p.categoryId?.name || '—' }}</td>
            <td>
              <button class="btn btn-outline-secondary btn-sm me-1" (click)="openEdit(p)">Edit</button>
              <button class="btn btn-outline-danger btn-sm" (click)="delete(p._id)">Delete</button>
            </td>
          </tr>
        </tbody>
      </table>

      <!-- Pagination -->
      <nav *ngIf="pages > 1">
        <ul class="pagination">
          <li class="page-item" *ngFor="let p of pageArr" [class.active]="p === page">
            <button class="page-link" (click)="goTo(p)">{{ p }}</button>
          </li>
        </ul>
      </nav>
    </div>
