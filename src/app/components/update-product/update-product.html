<div class="container mt-4">
    <h3> update Product </h3>
    <form [formGroup]="form" action="" (ngSubmit)="submet()">
        <div class="mb-3">
            <label for="">Name</label>
            <input type="text" class="form-control" formControlName="name">
            @if (form.get('name')?.touched && form.get('name')?.invalid){
                <small class="text-danger">name is required</small>
            }
        </div>
        <div class="mb-3">
            <label for="">price</label>
            <input type="text" class="form-control" formControlName="price">
            @if (form.get('price')?.touched && form.get('price')?.invalid){
                <small class="text-danger">price must be number and > 0</small>
            }
        </div>
        <div class="mb-3">
            <label for="">instock</label>
            <input type="text" class="form-control" formControlName="inStock">
            @if (form.get('inStock')?.touched && form.get('inStock')?.invalid){
                <small class="text-danger">Stock must number and be >=0 </small>
            }
        </div>

        <button class="btn btn-success" [disabled]="form.invalid">
           Update
        </button>
    </form>
</div>
