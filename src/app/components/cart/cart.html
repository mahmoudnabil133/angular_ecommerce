    <h3 class="mb-4">My Cart</h3>
    <div *ngIf="loading" class="text-center py-5"><div class="spinner-border"></div></div>

    <div *ngIf="!loading">
      <div *ngIf="products.length === 0" class="text-center py-5">
        <p class="text-muted">Your cart is empty.</p>
        <a routerLink="/products" class="btn btn-dark">Browse Products</a>
      </div>

      <div *ngIf="products.length > 0">
        <div class="card mb-2" *ngFor="let p of products">
          <div class="card-body d-flex align-items-center justify-content-between">
            <div>
              <strong>{{ p.name }}</strong>
              <span class="text-muted ms-2">EGP {{ p.price | number }}</span>
            </div>
            <button class="btn btn-outline-danger btn-sm" (click)="remove(p._id)" [disabled]="removingId === p._id">
              <span *ngIf="removingId === p._id" class="spinner-border spinner-border-sm"></span>
              <span *ngIf="removingId !== p._id">Remove</span>
            </button>
          </div>
        </div>

        <div class="d-flex justify-content-between align-items-center mt-3">
          <h5>Total: EGP {{ total | number }}</h5>
          <button class="btn btn-outline-danger btn-sm" (click)="clear()" [disabled]="clearing">
            <span *ngIf="clearing" class="spinner-border spinner-border-sm me-1"></span>
            Clear Cart
          </button>
        </div>
      </div>
    </div>
